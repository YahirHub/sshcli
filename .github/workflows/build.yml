name: Build Multi-Platform Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write
  actions: read

jobs:
  build-all:
    name: Build All Platforms (Single Runner)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create output directory
        run: mkdir -p dist

      - name: Build all binaries
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          
          echo "🔨 Compilando SSHCLI ${VERSION} para múltiples plataformas..."
          echo ""
          
          # ===== LINUX =====
          echo "📦 Linux AMD64..."
          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/sshcli-linux-amd64 .
          
          echo "📦 Linux ARM64..."
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/sshcli-linux-arm64 .
          
          echo "📦 Linux ARMv7..."
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="${LDFLAGS}" -o dist/sshcli-linux-armv7 .
          
          echo "📦 Linux ARMv6 (Raspberry Pi Zero)..."
          GOOS=linux GOARCH=arm GOARM=6 go build -ldflags="${LDFLAGS}" -o dist/sshcli-linux-armv6 .
          
          echo "📦 Linux 386..."
          GOOS=linux GOARCH=386 go build -ldflags="${LDFLAGS}" -o dist/sshcli-linux-386 .
          
          # ===== WINDOWS =====
          echo "📦 Windows AMD64..."
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/sshcli-windows-amd64.exe .
          
          echo "📦 Windows ARM64..."
          GOOS=windows GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/sshcli-windows-arm64.exe .
          
          echo "📦 Windows 386..."
          GOOS=windows GOARCH=386 go build -ldflags="${LDFLAGS}" -o dist/sshcli-windows-386.exe .
          
          # ===== MACOS =====
          echo "📦 macOS AMD64..."
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/sshcli-darwin-amd64 .
          
          echo "📦 macOS ARM64 (Apple Silicon)..."
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/sshcli-darwin-arm64 .
          
          # ===== FREEBSD =====
          echo "📦 FreeBSD AMD64..."
          GOOS=freebsd GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/sshcli-freebsd-amd64 .
          
          echo ""
          echo "✅ Compilación completada!"
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Compress binaries
        run: |
          cd dist
          VERSION=${{ steps.version.outputs.VERSION }}
          
          for file in sshcli-*; do
            if [[ "$file" == *.exe ]]; then
              zip "${file%.exe}-${VERSION}.zip" "$file"
            else
              tar -czvf "${file}-${VERSION}.tar.gz" "$file"
            fi
          done
          
          ls -lh *.tar.gz *.zip 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sshcli-binaries-${{ steps.version.outputs.VERSION }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}